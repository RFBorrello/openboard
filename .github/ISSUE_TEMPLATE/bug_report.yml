name: Bug report
description: Report a defect in OpenBoard
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Exact steps to reproduce the issue
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Desktop platform
      placeholder: Windows 11 / macOS 15 / Ubuntu 24.04
  - type: textarea
    id: csv_shape
    attributes:
      label: CSV shape
      description: Relevant headers or sample rows if they matter
